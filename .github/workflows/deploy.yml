name: Deploy

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_IMAGE: mikenye/minecraft_bedrock_server
  DOCKERHUB_USERNAME: mikenye
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  deploy:
    name: Deploy images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to ghcr.io
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set image tags
        run: |
          VERSION_TAG="${{ github.event.release.tag_name }}"

          {
            echo "IMAGE_TAGS=${GHCR_IMAGE}:latest,${GHCR_IMAGE}:${VERSION_TAG},${DOCKERHUB_IMAGE}:latest,${DOCKERHUB_IMAGE}:${VERSION_TAG}"
            echo "IMAGE_TAGS_NOHEALTHCHECK=${GHCR_IMAGE}:latest_nohealthcheck,${GHCR_IMAGE}:${VERSION_TAG}_nohealthcheck,${DOCKERHUB_IMAGE}:latest_nohealthcheck,${DOCKERHUB_IMAGE}:${VERSION_TAG}_nohealthcheck"
          } >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          no-cache: true
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_TAGS }}

      - name: Patch Dockerfile to remove healthcheck
        run: sed '/^HEALTHCHECK /d' < Dockerfile > Dockerfile.nohealthcheck

      - name: Build and push nohealthcheck
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile.nohealthcheck
          no-cache: false
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_TAGS_NOHEALTHCHECK }}
